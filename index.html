<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Website Shield</title>
    <!-- Use Flask's url_for to load static files -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Fake Website Shield</h1>
                <p>Analyze URLs for suspicious patterns and potential phishing threats.</p>
            </div>
            
            <form id="detection-form">
                <div class="input-group">
                    <input type="url" id="url-input" placeholder="https://example.com" required>
                </div>
                <button type="submit" id="check-btn">
                    <span class="btn-text">Check Website</span>
                    <div class="loader" id="btn-loader"></div>
                </button>
            </form>

            <div id="result-container" class="hidden">
                <div id="status-badge" class="badge"></div>
                <h3 id="result-title"></h3>
                <ul id="reasons-list"></ul>
            </div>
        </div>
    </div>
    
    <!-- Use Flask's url_for to load JavaScript script -->
    <script src="script.js"></script>
</body>
</html>
